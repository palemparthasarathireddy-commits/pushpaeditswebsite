<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Pushpa Edits</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060608;
            --surface: #0d0d10;
            --surface2: #13131a;
            --gold: #d4a843;
            --gold2: #f0c96a;
            --goldglow: rgba(212,168,67,.15);
            --red: #e63946;
            --white: #eeeae0;
            --muted: #6b6860;
            --border: rgba(212,168,67,.14);
            --border2: rgba(212,168,67,.3);
            --green: #22c55e;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--white); font-family:'Syne',sans-serif; min-height:100vh; }

        /* ── LOGIN ── */
        #loginPage {
            min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem;
        }
        .login-card {
            background:var(--surface); border:1px solid var(--border); padding:3rem 2.5rem;
            width:100%; max-width:380px; text-align:center;
        }
        .login-logo { font-family:'Playfair Display',serif; font-size:2rem; font-style:italic; color:var(--gold); margin-bottom:.4rem; }
        .login-sub { font-size:.65rem; letter-spacing:.25em; text-transform:uppercase; color:var(--muted); margin-bottom:2.5rem; }
        .login-card input {
            width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--white);
            padding:.9rem 1rem; font-family:'Syne',sans-serif; font-size:.9rem; outline:none;
            transition:border-color .3s; margin-bottom:1rem;
        }
        .login-card input:focus { border-color:var(--gold); }
        .btn-gold {
            background:var(--gold); color:#060608; border:none; padding:.9rem 2rem;
            font-family:'Syne',sans-serif; font-size:.72rem; font-weight:700;
            letter-spacing:.18em; text-transform:uppercase; cursor:pointer; width:100%;
            transition:background .3s, transform .2s;
        }
        .btn-gold:hover { background:var(--gold2); transform:translateY(-2px); }
        .login-err { color:var(--red); font-size:.78rem; margin-top:.8rem; min-height:1.2em; }

        /* ── DASHBOARD ── */
        #dashboard { display:none; }
        .topbar {
            position:sticky; top:0; z-index:100;
            background:rgba(6,6,8,.92); backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            padding:1.2rem 5vw; display:flex; justify-content:space-between; align-items:center;
        }
        .topbar-logo { font-family:'Playfair Display',serif; font-style:italic; color:var(--gold); font-size:1.4rem; }
        .topbar-right { display:flex; align-items:center; gap:1rem; }
        .badge {
            font-size:.6rem; letter-spacing:.15em; text-transform:uppercase;
            background:var(--goldglow); border:1px solid var(--border2); color:var(--gold);
            padding:.3rem .8rem;
        }
        .btn-logout {
            background:none; border:1px solid var(--border2); color:var(--muted);
            padding:.5rem 1.2rem; font-family:'Syne',sans-serif; font-size:.65rem;
            letter-spacing:.15em; text-transform:uppercase; cursor:pointer; transition:all .3s;
        }
        .btn-logout:hover { border-color:var(--red); color:var(--red); }

        .main { max-width:1200px; margin:0 auto; padding:3rem 5vw 6rem; }

        /* ── UPLOAD CARD ── */
        .card {
            background:var(--surface); border:1px solid var(--border);
            padding:2rem; margin-bottom:2.5rem;
        }
        .card-title {
            font-size:.65rem; letter-spacing:.25em; text-transform:uppercase;
            color:var(--gold); font-weight:700; margin-bottom:1.5rem;
            display:flex; align-items:center; gap:.6rem;
        }
        .card-title::before { content:''; display:inline-block; width:20px; height:1px; background:var(--gold); }

        /* Drop zone */
        #dropZone {
            border:2px dashed var(--border2); padding:3rem 2rem; text-align:center;
            cursor:pointer; transition:all .3s; position:relative;
        }
        #dropZone:hover, #dropZone.drag-over { border-color:var(--gold); background:var(--goldglow); }
        .drop-icon { font-size:2.5rem; margin-bottom:.8rem; opacity:.5; }
        .drop-text { font-size:.85rem; color:var(--muted); }
        .drop-text strong { color:var(--gold); }
        #fileInput { display:none; }

        /* Meta fields */
        .meta-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:1.2rem; }
        .meta-group { display:flex; flex-direction:column; gap:.4rem; }
        .meta-label { font-size:.58rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); font-weight:600; }
        .meta-input, .meta-select {
            background:var(--surface2); border:1px solid var(--border); color:var(--white);
            padding:.75rem 1rem; font-family:'Syne',sans-serif; font-size:.85rem; outline:none;
            transition:border-color .3s; width:100%;
        }
        .meta-input:focus, .meta-select:focus { border-color:var(--gold); }
        .meta-select option { background:#13131a; }

        /* Preview */
        #previewWrap { margin-top:1.2rem; display:none; }
        #previewWrap video { width:100%; max-height:260px; object-fit:cover; display:block; border:1px solid var(--border); }
        .preview-name { font-size:.78rem; color:var(--muted); margin-top:.5rem; }

        /* Progress */
        #progressWrap { margin-top:1.2rem; display:none; }
        .prog-label { font-size:.7rem; color:var(--muted); margin-bottom:.5rem; display:flex; justify-content:space-between; }
        .prog-bar { height:3px; background:rgba(212,168,67,.12); position:relative; overflow:hidden; }
        .prog-fill { height:100%; background:var(--gold); width:0; transition:width .2s; }

        /* Upload button */
        #uploadBtn {
            margin-top:1.2rem; background:var(--gold); color:#060608; border:none;
            padding:.9rem 2.5rem; font-family:'Syne',sans-serif; font-size:.72rem;
            font-weight:700; letter-spacing:.18em; text-transform:uppercase;
            cursor:pointer; transition:all .3s; display:none;
        }
        #uploadBtn:hover { background:var(--gold2); transform:translateY(-2px); }
        #uploadBtn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

        /* ── VIDEO LIST ── */
        #videoList { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.2rem; }

        .vid-card {
            background:var(--surface2); border:1px solid var(--border);
            overflow:hidden; transition:border-color .3s;
        }
        .vid-card:hover { border-color:var(--border2); }
        .vid-thumb-wrap { position:relative; aspect-ratio:16/9; background:#000; overflow:hidden; }
        .vid-thumb-wrap video { width:100%; height:100%; object-fit:cover; opacity:.85; transition:opacity .3s; }
        .vid-card:hover .vid-thumb-wrap video { opacity:1; }
        .vid-card-body { padding:1rem; display:flex; justify-content:space-between; align-items:center; gap:.5rem; }
        .vid-meta {}
        .vid-title { font-size:.85rem; font-weight:600; color:var(--white); margin-bottom:.25rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
        .vid-date { font-size:.62rem; color:var(--muted); letter-spacing:.05em; }
        .vid-cat { font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin-top:.2rem; }
        .btn-delete {
            background:none; border:1px solid rgba(230,57,70,.3); color:var(--red);
            width:34px; height:34px; cursor:pointer; display:flex; align-items:center;
            justify-content:center; flex-shrink:0; transition:all .3s; font-size:1rem;
        }
        .btn-delete:hover { background:var(--red); color:#fff; border-color:var(--red); }

        /* Loading / empty states */
        .state-msg {
            text-align:center; padding:4rem 2rem; color:var(--muted);
            font-size:.85rem; letter-spacing:.05em; border:1px dashed var(--border);
        }
        .spin { display:inline-block; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Toast */
        #toast {
            position:fixed; bottom:2rem; right:2rem; z-index:9999;
            padding:.9rem 1.5rem; font-size:.8rem; font-weight:600; letter-spacing:.05em;
            border-left:3px solid var(--green); background:var(--surface);
            border-top:1px solid var(--border); border-right:1px solid var(--border); border-bottom:1px solid var(--border);
            transform:translateY(120%); transition:transform .35s cubic-bezier(.16,1,.3,1);
            max-width:320px;
        }
        #toast.show { transform:translateY(0); }
        #toast.err { border-left-color:var(--red); }

        /* Confirm modal */
        #confirmOverlay {
            position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:9000;
            display:flex; align-items:center; justify-content:center;
            opacity:0; pointer-events:none; transition:opacity .3s; backdrop-filter:blur(6px);
        }
        #confirmOverlay.open { opacity:1; pointer-events:all; }
        .confirm-box { background:var(--surface); border:1px solid var(--border2); padding:2.5rem; max-width:360px; width:90%; text-align:center; }
        .confirm-title { font-family:'Playfair Display',serif; font-size:1.3rem; margin-bottom:.8rem; }
        .confirm-sub { font-size:.82rem; color:var(--muted); margin-bottom:2rem; }
        .confirm-btns { display:flex; gap:1rem; justify-content:center; }
        .btn-cancel {
            background:none; border:1px solid var(--border2); color:var(--white);
            padding:.7rem 1.5rem; font-family:'Syne',sans-serif; font-size:.7rem;
            letter-spacing:.12em; text-transform:uppercase; cursor:pointer; transition:all .3s;
        }
        .btn-cancel:hover { border-color:var(--muted); }
        .btn-confirm-del {
            background:var(--red); border:none; color:#fff;
            padding:.7rem 1.5rem; font-family:'Syne',sans-serif; font-size:.7rem;
            letter-spacing:.12em; text-transform:uppercase; cursor:pointer; transition:opacity .3s;
        }
        .btn-confirm-del:hover { opacity:.85; }

        @media(max-width:600px) {
            .meta-row { grid-template-columns:1fr; }
            .topbar-logo { font-size:1.1rem; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-card">
        <div class="login-logo">Pushpa.</div>
        <div class="login-sub">Admin Dashboard</div>
        <input type="password" id="pwInput" placeholder="Enter admin password" autocomplete="current-password">
        <button class="btn-gold" onclick="doLogin()">Access Dashboard</button>
        <div class="login-err" id="loginErr"></div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="topbar">
        <div class="topbar-logo">Pushpa.</div>
        <div class="topbar-right">
            <span class="badge">Admin Panel</span>
            <button class="btn-logout" onclick="doLogout()">Logout</button>
        </div>
    </div>

    <div class="main">

        <!-- UPLOAD SECTION -->
        <div class="card">
            <div class="card-title">Upload New Video</div>

            <div id="dropZone">
                <div class="drop-icon">🎬</div>
                <div class="drop-text">Drag &amp; drop a video file here, or <strong>click to browse</strong></div>
                <input type="file" id="fileInput" accept="video/*">
            </div>

            <div id="previewWrap">
                <video id="previewVideo" controls></video>
                <div class="preview-name" id="previewName"></div>
            </div>

            <div class="meta-row">
                <div class="meta-group">
                    <label class="meta-label" for="vidTitle">Project Title</label>
                    <input class="meta-input" type="text" id="vidTitle" placeholder="e.g. Wedding Highlights">
                </div>
                <div class="meta-group">
                    <label class="meta-label" for="vidCat">Category</label>
                    <select class="meta-select" id="vidCat">
                        <option value="Video">Video</option>
                        <option value="Wedding">Wedding</option>
                        <option value="Short Film">Short Film</option>
                        <option value="Promo">Promo</option>
                        <option value="Social Media">Social Media</option>
                        <option value="Brand Highlight">Brand Highlight</option>
                        <option value="Cinematic Edit">Cinematic Edit</option>
                        <option value="Post-Production">Post-Production</option>
                    </select>
                </div>
            </div>

            <div id="progressWrap">
                <div class="prog-label"><span id="progStatus">Uploading to Cloudinary…</span><span id="progPct">0%</span></div>
                <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
            </div>

            <button class="btn-gold" id="uploadBtn" onclick="doUpload()">Upload Video</button>
        </div>

        <!-- VIDEO LIST SECTION -->
        <div class="card">
            <div class="card-title">Uploaded Videos</div>
            <div id="videoList"><div class="state-msg"><span class="spin">⏳</span> Loading videos…</div></div>
        </div>

    </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmOverlay">
    <div class="confirm-box">
        <div class="confirm-title">Delete Video?</div>
        <div class="confirm-sub">This will permanently remove the video from Cloudinary and the database. This cannot be undone.</div>
        <div class="confirm-btns">
            <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
            <button class="btn-confirm-del" id="confirmDelBtn">Delete</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// CONFIG — replace with your actual values
// ============================================================
const ADMIN_PASSWORD       = 'pushpa@admin2024';
const SUPABASE_URL         = 'https://mrkcbfhbhazzmwiqsmhg.supabase.co';
const SUPABASE_ANON_KEY    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ya2NiZmhiaGF6em13aXFzbWhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5Nzc0NTMsImV4cCI6MjA5NDU1MzQ1M30.7DmfGdRvlGaVbsuHLAu-cSIJGwJi81QooRa-n2DJRyk';
const CLOUDINARY_CLOUD     = 'dpor8dhgy';
const CLOUDINARY_PRESET    = 'pushpa';
// ============================================================

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selectedFile = null;
let pendingDeleteId = null;
let pendingDeletePublicId = null;

// ── AUTH ────────────────────────────────────────────
function doLogin() {
    const val = document.getElementById('pwInput').value;
    if (val === ADMIN_PASSWORD) {
        localStorage.setItem('pk_admin', '1');
        showDashboard();
    } else {
        document.getElementById('loginErr').textContent = 'Incorrect password. Try again.';
        document.getElementById('pwInput').value = '';
    }
}
function doLogout() {
    localStorage.removeItem('pk_admin');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
}
function showDashboard() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadVideos();
}
document.getElementById('pwInput').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
if (localStorage.getItem('pk_admin') === '1') showDashboard();

// ── DROP ZONE ────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if(fileInput.files[0]) setFile(fileInput.files[0]); });

const MAX_FILE_MB = 500;
function setFile(f) {
    // Check file size before allowing upload
    const sizeMB = f.size / 1024 / 1024;
    if (sizeMB > MAX_FILE_MB) {
        showToast(`✗ File too large: ${sizeMB.toFixed(1)} MB (max ${MAX_FILE_MB} MB). Please compress the video first.`, true);
        fileInput.value = '';
        return;
    }
    selectedFile = f;
    const url = URL.createObjectURL(f);
    document.getElementById('previewVideo').src = url;
    document.getElementById('previewName').textContent = f.name + ' (' + sizeMB.toFixed(1) + ' MB)';
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('uploadBtn').style.display = 'inline-block';
    if (!document.getElementById('vidTitle').value) {
        document.getElementById('vidTitle').value = f.name.replace(/\.[^/.]+$/, '').replace(/[_-]/g,' ');
    }
}

// ── UPLOAD ────────────────────────────────────────────
async function doUpload() {
    if (!selectedFile) return;
    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.textContent = 'Uploading…';

    const progWrap = document.getElementById('progressWrap');
    const progFill = document.getElementById('progFill');
    const progPct  = document.getElementById('progPct');
    const progStatus = document.getElementById('progStatus');
    progWrap.style.display = 'block';

    try {
        // 1. Upload to Cloudinary
        progStatus.textContent = 'Uploading to Cloudinary…';
        const { url, public_id } = await uploadToCloudinary(selectedFile, pct => {
            progFill.style.width = pct + '%';
            progPct.textContent = pct + '%';
        });

        // 2. Save to Supabase
        progStatus.textContent = 'Saving metadata…';
        const title    = document.getElementById('vidTitle').value || 'New Project';
        const category = document.getElementById('vidCat').value   || 'Video';

        const { error } = await db.from('videos').insert([{ video_url: url, public_id, title, category }]);
        if (error) throw error;

        showToast('✓ Video uploaded successfully!', false);
        resetUploadForm();
        loadVideos();
    } catch(e) {
        showToast('✗ Upload failed: ' + e.message, true);
    } finally {
        btn.disabled = false;
        btn.textContent = 'Upload Video';
        progWrap.style.display = 'none';
        progFill.style.width = '0';
    }
}

async function uploadToCloudinary(file, onProgress) {
    const CHUNK_SIZE = 15 * 1024 * 1024; // 15MB chunks
    const totalBytes = file.size;
    const uploadId = 'up_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
    const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/video/upload`;
    
    let finalResponse = null;

    for (let start = 0; start < totalBytes; start += CHUNK_SIZE) {
        const end = Math.min(start + CHUNK_SIZE, totalBytes);
        const chunk = file.slice(start, end);
        
        const fd = new FormData();
        fd.append('file', chunk, file.name);
        fd.append('upload_preset', CLOUDINARY_PRESET);
        fd.append('resource_type', 'video');
        
        finalResponse = await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', url);
            xhr.setRequestHeader('X-Unique-Upload-Id', uploadId);
            xhr.setRequestHeader('Content-Range', `bytes ${start}-${end - 1}/${totalBytes}`);
            xhr.timeout = 300000; // 5 mins per chunk
            
            xhr.upload.onprogress = e => {
                if (e.lengthComputable) {
                    const loadedTotal = start + e.loaded;
                    onProgress(Math.round((loadedTotal / totalBytes) * 100));
                }
            };
            
            xhr.onload = () => {
                if (xhr.status === 200 || xhr.status === 201) {
                    resolve(JSON.parse(xhr.responseText));
                } else {
                    let errMsg = `Cloudinary error (status ${xhr.status})`;
                    try {
                        const errBody = JSON.parse(xhr.responseText);
                        if (errBody && errBody.error && errBody.error.message) {
                            errMsg = errBody.error.message;
                        }
                    } catch(_) {}
                    reject(new Error(errMsg));
                }
            };
            
            xhr.onerror = () => reject(new Error('Network error during chunk upload. Check internet connection.'));
            xhr.ontimeout = () => reject(new Error('Chunk upload timed out after 5 minutes.'));
            xhr.send(fd);
        });
    }
    
    if (finalResponse && finalResponse.secure_url) {
        const optimizedUrl = finalResponse.secure_url.replace('/upload/', '/upload/f_auto,q_auto/');
        return { url: optimizedUrl, public_id: finalResponse.public_id };
    } else {
        throw new Error('Upload finished but no URL returned');
    }
}

function resetUploadForm() {
    selectedFile = null;
    fileInput.value = '';
    document.getElementById('previewVideo').src = '';
    document.getElementById('previewWrap').style.display = 'none';
    document.getElementById('uploadBtn').style.display = 'none';
    document.getElementById('vidTitle').value = '';
}

// ── LOAD VIDEOS ──────────────────────────────────────
async function loadVideos() {
    const list = document.getElementById('videoList');
    list.innerHTML = '<div class="state-msg"><span class="spin">⏳</span> Loading…</div>';
    const { data, error } = await db.from('videos').select('*').order('created_at', { ascending: false });
    if (error) { list.innerHTML = '<div class="state-msg">⚠ Could not load videos.</div>'; return; }
    if (!data || data.length === 0) {
        list.innerHTML = '<div class="state-msg">No videos uploaded yet. Upload your first one above!</div>';
        return;
    }
    list.innerHTML = '';
    data.forEach(v => list.appendChild(buildCard(v)));
}

function buildCard(v) {
    const div = document.createElement('div');
    div.className = 'vid-card';
    div.id = 'card_' + v.id;
    const date = new Date(v.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    div.innerHTML = `
        <div class="vid-thumb-wrap">
            <video src="${v.video_url}" preload="metadata" muted loop
                onmouseenter="this.play()" onmouseleave="this.pause()"></video>
        </div>
        <div class="vid-card-body">
            <div class="vid-meta">
                <div class="vid-title" title="${v.title||''}">${v.title || 'Untitled'}</div>
                <div class="vid-cat">${v.category || 'Video'}</div>
                <div class="vid-date">${date}</div>
            </div>
            <button class="btn-delete" title="Delete" onclick="askDelete('${v.id}','${v.public_id}')">✕</button>
        </div>`;
    return div;
}

// ── DELETE ────────────────────────────────────────────
function askDelete(id, publicId) {
    pendingDeleteId = id;
    pendingDeletePublicId = publicId;
    document.getElementById('confirmOverlay').classList.add('open');
    document.getElementById('confirmDelBtn').onclick = doDelete;
}
function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('open');
    pendingDeleteId = null; pendingDeletePublicId = null;
}

async function doDelete() {
    closeConfirm();
    if (!pendingDeleteId && !pendingDeletePublicId) return;
    const id = pendingDeleteId, pub = pendingDeletePublicId;

    // Remove card immediately (optimistic UI)
    const card = document.getElementById('card_' + id);
    if (card) card.style.opacity = '0.3';

    try {
        // Delete from Supabase
        const { error } = await db.from('videos').delete().eq('id', id);
        if (error) throw error;

        // NOTE: Cloudinary deletion from frontend requires a signed request with your API Secret,
        // which must NOT be exposed here. To delete from Cloudinary, set up a small serverless
        // function (Vercel API route or Supabase Edge Function) and call it here.
        // For now, the record is removed from the DB and the card is removed from the UI.

        if (card) card.remove();
        showToast('✓ Video removed from portfolio.', false);
    } catch(e) {
        if (card) card.style.opacity = '1';
        showToast('✗ Delete failed: ' + e.message, true);
    }
}

// ── TOAST ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isErr ? 'err show' : 'show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// Close confirm on overlay click
document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
});
</script>
